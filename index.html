<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学国語 類義語・対義語マスター</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 650px;
            padding: 24px;
            position: relative;
        }
        .btn-quit {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e53e3e;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-quit:hover {
            background-color: #c53030;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        /* タイトル画面 */
        .title-screen {
            text-align: center;
            padding: 20px 0;
        }
        .title-screen h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 12px;
        }
        .title-screen p {
            color: #718096;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-start {
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-start:hover {
            background-color: #2b6cb0;
        }
        /* カテゴリー選択画面 */
        .category-title {
            font-size: 1.3rem;
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
        }
        .cat-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-cat {
            background-color: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #2d3748;
        }
        .btn-cat:hover {
            background-color: #ebf8ff;
            border-color: #63b3ed;
        }
        .cat-count {
            font-size: 0.85rem;
            color: #718096;
            background-color: #edf2f7;
            padding: 4px 8px;
            border-radius: 4px;
        }
        /* クイズ画面 */
        .header {
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .cat-tag {
            font-size: 0.8rem;
            background-color: #e2e8f0;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .progress-bar-container {
            background-color: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar {
            background-color: #3182ce;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .status {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #718096;
            margin-top: 8px;
        }
        .question-box {
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.15rem;
            color: #1a202c;
            line-height: 1.5;
            font-weight: bold;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-option {
            background-color: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            color: #2d3748;
        }
        .btn-option:hover:not(:disabled) {
            background-color: #ebf8ff;
            border-color: #63b3ed;
        }
        .btn-option.correct {
            background-color: #c6f6d5;
            border-color: #38a169;
            color: #22543d;
            font-weight: bold;
        }
        .btn-option.wrong {
            background-color: #fed7d7;
            border-color: #e53e3e;
            color: #742a2a;
        }
        .explanation-box {
            margin-top: 16px;
            padding: 14px;
            border-radius: 8px;
            background-color: #f7fafc;
            border-left: 4px solid #3182ce;
            display: none;
        }
        .explanation-title {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .explanation-text {
            font-size: 0.9rem;
            color: #4a5568;
            line-height: 1.4;
        }
        .controls {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
        }
        .btn-next {
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }
        /* 結果画面 */
        .result-box {
            text-align: center;
            padding: 20px 0;
        }
        .result-title {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background-color: #f7fafc;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-num {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2b6cb0;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #718096;
            margin-top: 4px;
        }
        .btn-restart {
            background-color: #38a169;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- やめるボタン -->
        <button class="btn-quit" id="btn-quit" onclick="resetToTitle()" style="display: none;">やめる</button>

        <!-- 1. タイトル画面 -->
        <div id="screen-title" class="screen active title-screen">
            <h1>中学国語 類義語・対義語</h1>
            <p>教科書掲載の単語を網羅！<br>カテゴリー別にマスターしよう。</p>
            <button class="btn-start" onclick="showCategoryScreen()">挑戦する</button>
        </div>

        <!-- 2. カテゴリー選択画面 -->
        <div id="screen-category" class="screen">
            <div class="category-title">挑戦するカテゴリーを選択</div>
            <div class="cat-list">
                <button class="btn-cat" onclick="startQuiz('all')">
                    <span>🌟 全カテゴリー（ランダム全問）</span>
                    <span class="cat-count" id="count-all">224問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('syn_same')">
                    <span>【類義語】共通の字を含むもの</span>
                    <span class="cat-count" id="count-syn_same">45問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('syn_all')">
                    <span>【類義語】全体として類義のもの</span>
                    <span class="cat-count" id="count-syn_all">30問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('ant_same')">
                    <span>【対義語】共通の字を含むもの</span>
                    <span class="cat-count" id="count-ant_same">77問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('ant_neg')">
                    <span>【対義語】否定の字を含むもの</span>
                    <span class="cat-count" id="count-ant_neg">33問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('ant_all')">
                    <span>【対義語】言葉全体が対義のもの</span>
                    <span class="cat-count" id="count-ant_all">39問</span>
                </button>
            </div>
        </div>

        <!-- 3. クイズ画面 -->
        <div id="screen-quiz" class="screen">
            <div class="header">
                <span class="cat-tag" id="q-cat-name">カテゴリー</span>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="status">
                    <span id="q-progress">第 1 問 / 10 問</span>
                    <span>正解: <strong id="stat-correct">0</strong> | 誤答: <strong id="stat-wrong">0</strong> (正解率: <span id="stat-rate">0%</span>)</span>
                </div>
            </div>

            <div class="question-box">
                <div class="question-text" id="q-text">問題文がここに入ります</div>
            </div>

            <div class="options" id="options-container"></div>

            <div class="explanation-box" id="explanation-box">
                <div class="explanation-title" id="eval-result">解説</div>
                <div class="explanation-text" id="explanation-text">解説文が入ります</div>
            </div>

            <div class="controls">
                <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ</button>
            </div>
        </div>

        <!-- 4. 結果画面 -->
        <div id="screen-result" class="screen result-box">
            <div class="result-title">学習終了！</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-num" id="res-correct">0</div>
                    <div class="stat-label">正答数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="res-wrong" style="color: #e53e3e;">0</div>
                    <div class="stat-label">誤回答数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="res-rate" style="color: #38a169;">0%</div>
                    <div class="stat-label">正解率</div>
                </div>
            </div>
            <button class="btn-restart" onclick="showCategoryScreen()">別のカテゴリーに挑戦</button>
        </div>
    </div>

    <script>
        // 完全網羅データ（全224問）
        const rawDatabase = [
            // 類義語：共通の字を含むもの (45)
            {cat:"syn_same", catName:"類義語:共通字", q:"「安易」の類義語は？", ans:"安直", exp:"「安易」と「安直」はどちらも簡単に済ませる様子。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「家外」の類義語は？", ans:"意外", exp:"「家外」と「意外」は思いのほかであることを指す。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「以後」の類義語は？", ans:"以降", exp:"「以後」と「以降」はそれより後ろの時間を指す。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「異異」の類義語は？", ans:"異存", exp:"「異異」と「異存」は他と異なる意見。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「委細」の類義語は？", ans:"詳細", exp:"「委細」と「詳細」は詳しい内容のこと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「医師」の類義語は？", ans:"医者", exp:"「医師」と「医者」は医療を行う専門職。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「永遠」の類義語は？", ans:"永久", exp:"「永遠」と「永久」は果てしなく続くこと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「応接」の類義語は？", ans:"応対", exp:"「応接」と「応対」は相手の相手をすること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「応答」の類義語は？", ans:"返答", exp:"「応答」と「返答」は問いに答えること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「憶測」の類義語は？", ans:"推測", exp:"「憶測」と「推測」は状態をおしはかること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「快活」の類義語は？", ans:"活発", exp:"「快活」と「活発」は元気で生き生きとしていること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「改善」の類義語は？", ans:"改良", exp:"「改善」と「改良」は良く改めること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「回想」の類義語は？", ans:"追想", exp:"「回想」と「追想」は過去を振り返ること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「核心」の類義語は？", ans:"中心", exp:"「核心」と「中心」は大切な真ん中部分。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「慣習」の類義語は？", ans:"慣例", exp:"「慣習」と「慣例」は昔からのしきたり。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「肝心」の類義語は？", ans:"肝要", exp:"「肝心」と「肝要」は特に重要であること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「寛心」の類義語は？", ans:"寛容", exp:"「寛心」と「寛容」は心が広く咎めないこと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「願望」の類義語は？", ans:"希望", exp:"「願望」と「希望」は望み願うこと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「企画」の類義語は？", ans:"計画", exp:"「企画」と「計画」は試みを立てること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「帰郷」の類義語は？", ans:"帰省", exp:"「帰郷」と「帰省」は故郷へ帰ること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「気質」の類義語は？", ans:"性質", exp:"「気質」と「性質」は生まれ持った体質・性格。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「基準」の類義語は？", ans:"標準", exp:"「基準」と「標準」は判断のよりどころ。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「機知」の類義語は？", ans:"機転", exp:"「機知」と「機転」は状況に応じた働かせ。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「休憩」の類義語は？", ans:"休息", exp:"「休憩」と「休息」は体を休めること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「経験」の類義語は？", ans:"体験", exp:"「経験」と「体験」は実際にやってみること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「計略」の類義語は？", ans:"策略", exp:"「計略」と「策略」ははかりごと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「経歴」の類義語は？", ans:"履歴", exp:"「経歴」と「履歴」はこれまでの歩み。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「結婚」の類義語は？", ans:"婚姻", exp:"「結婚」と「婚姻」は夫婦になること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「傑作」の類義語は？", ans:"名作", exp:"「傑作」と「名作」はすぐれた作品。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「限界」の類義語は？", ans:"限度", exp:"「限界」と「限度」はこれ以上超えられない境。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「堅実」の類義語は？", ans:"着実", exp:"「堅実」と「着実」は確実に行う様子。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「倹約」の類義語は？", ans:"節約", exp:"「倹約」と「節約」は無駄を省くこと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「原料」の類義語は？", ans:"材料", exp:"「原料」と「材料」は製品のもと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「好調」の類義語は？", ans:"順調", exp:"「好調」と「順調」は具合よく進むこと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「効能」の類義語は？", ans:"効用", exp:"「効能」と「効用」はききめ・働き。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「考慮」の類義語は？", ans:"配慮", exp:"「考慮」と「配慮」は心を配ること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「故国」の類義語は？", ans:"祖国", exp:"「故国」と「祖国」は母国。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「才女」の類義語は？", ans:"才媛", exp:"「才女」と「才媛」は学識ある女性。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「施策」の類義語は？", ans:"方策", exp:"「施策」と「方策」は行うべき策。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「辞職」の類義語は？", ans:"辞任", exp:"「辞職」と「辞任」は職を辞めること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「就任」の類義語は？", ans:"着任", exp:"「就任」と「着任」は任務に就くこと。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「自然」の類義語は？", ans:"天然", exp:"「自然」と「天然」は人の手が入らない様。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「名案」の類義語は？", ans:"妙案", exp:"「名案」と「妙案」はすぐれたアイディア。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「承認」の類義語は？", ans:"是認", exp:"「承認」と「是認」は良いと認めること。"},
            {cat:"syn_same", catName:"類義語:共通字", q:"「所持」の類義語は？", ans:"所有", exp:"「所持」と「所有」は自分のものとすること。"},

            // 類義語：全体として類義のもの (30)
            {cat:"syn_all", catName:"類義語:全体類義", q:"「安全」の類義語は？", ans:"無事", exp:"「安全」と「無事」は危なくないこと。"},
            {cat:"syn_all", catName:"類義語:全体類義", q:"「案内」の類義語は？", ans:"誘導", exp:"「案内」と「誘導」は導いて教えること。"},
            {cat:"syn_all", catName:"類義語:全体類義", q:"「意向」の類義語は？", ans:"意図", exp:"「意向」と「意図」は考え・ねらい。"},
            {cat:"syn_all", catName:"類義語:全体類義", q:"「遺憾」の類義語は？", ans:"残念", exp:"「遺憾」と「残念」は心残りであること。"},
            {cat:"syn_all", catName:"類義語:全体類義", q:"「腕前」の類義語は？", ans:"技能", exp:"「腕前」と「技能」は技術や能力。"},
            {cat:"syn_all", catName:"類義語:全体類義", q:"「運搬」の類義語は？", ans:"輸送", exp:"「運搬」と「輸送」は物を運ぶこと。"},
            {cat:"syn_all", catName:"類義語:全体類義", q:"「会得」の類義語は？", ans:"理解", exp:"「会得」と「理解」は読み取って知ること。"},
            {cat:"syn_all", catName:"類義語:全体類義", q:"「縁者」の類義語は？", ans:"親類", exp:"「縁者」と「親類」は血縁関係のある人。"},
            {cat:"syn_all", catName:"類義語:全体類義", q:"「音信」の類義語は？", ans:"消息", exp:"「音信」と「消息」は便りや状況。"},

        ];

        // 状態変数
        let currentQuestions = [];
        let currentIdx = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let answered = false;
        let lastOptions = [];

        // 全選択肢プールを作成（ダミー用）
        const allAnswersPool = Array.from(new Set(rawDatabase.map(d => d.ans)));

        // 画面切り替え関数
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');

            const btnQuit = document.getElementById('btn-quit');
            btnQuit.style.display = (screenId === 'screen-quiz' || screenId === 'screen-result') ? 'block' : 'none';
        }

        function showCategoryScreen() {
            switchScreen('screen-category');
        }

        function resetToTitle() {
            currentQuestions = [];
            currentIdx = 0;
            correctCount = 0;
            wrongCount = 0;
            lastOptions = [];
            switchScreen('screen-title');
        }

        // シャッフル関数
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // クイズ開始
        function startQuiz(categoryKey) {
            let filtered = [];
            if (categoryKey === 'all') {
                filtered = rawDatabase;
            } else {
                filtered = rawDatabase.filter(item => item.cat === categoryKey);
            }

            currentQuestions = shuffle(filtered);
            currentIdx = 0;
            correctCount = 0;
            wrongCount = 0;
            lastOptions = [];

            switchScreen('screen-quiz');
            loadQuestion();
        }

        // 問題読み込み
        function loadQuestion() {
            answered = false;
            const q = currentQuestions[currentIdx];

            // ヘッダー情報
            document.getElementById('q-cat-name').innerText = q.catName;
            document.getElementById('q-progress').innerText = `第 ${currentIdx + 1} 問 / ${currentQuestions.length} 問`;
            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-wrong').innerText = wrongCount;

            const totalAnswered = correctCount + wrongCount;
            const rate = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;
            document.getElementById('stat-rate').innerText = `${rate}%`;

            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / currentQuestions.length) * 100}%`;

            // 問題文
            document.getElementById('q-text').innerText = q.q;

            // 選択肢の生成（連続重複制御付き）
            let dummies = allAnswersPool.filter(a => a !== q.ans && !lastOptions.includes(a));
            if (dummies.length < 3) {
                dummies = allAnswersPool.filter(a => a !== q.ans);
            }
            dummies = shuffle(dummies).slice(0, 3);

            let options = shuffle([q.ans, ...dummies]);
            lastOptions = options;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = `${i + 1}. ${opt}`;
                btn.onclick = () => checkAnswer(opt, btn, q.ans);
                container.appendChild(btn);
            });

            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';
        }

        // 正誤判定
        function checkAnswer(selectedOpt, selectedBtn, correctOpt) {
            if (answered) return;
            answered = true;

            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => btn.disabled = true);

            const evalResult = document.getElementById('eval-result');

            if (selectedOpt === correctOpt) {
                correctCount++;
                selectedBtn.classList.add('correct');
                evalResult.innerText = '⭕ 正解！';
                evalResult.style.color = '#276749';
            } else {
                wrongCount++;
                selectedBtn.classList.add('wrong');
                buttons.forEach(btn => {
                    if (btn.innerText.includes(correctOpt)) btn.classList.add('correct');
                });
                evalResult.innerText = '❌ 不正解...';
                evalResult.style.color = '#9b2c2c';
            }

            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-wrong').innerText = wrongCount;
            const rate = Math.round((correctCount / (correctCount + wrongCount)) * 100);
            document.getElementById('stat-rate').innerText = `${rate}%`;

            document.getElementById('explanation-text').innerText = currentQuestions[currentIdx].exp;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('btn-next').style.display = 'inline-block';
        }

        // 次の問題または結果画面
        function nextQuestion() {
            currentIdx++;
            if (currentIdx < currentQuestions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        // 結果画面表示
        function showResult() {
            switchScreen('screen-result');
            const total = correctCount + wrongCount;
            const rate = total > 0 ? Math.round((correctCount / total) * 100) : 0;

            document.getElementById('res-correct').innerText = correctCount;
            document.getElementById('res-wrong').innerText = wrongCount;
            document.getElementById('res-rate').innerText = `${rate}%`;
        }
