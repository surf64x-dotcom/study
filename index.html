<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学国語 類義語・対義語マスター</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 650px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .btn-quit {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e53e3e;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease, background 0.2s ease;
        }
        .btn-quit:active {
            transform: scale(0.95);
        }

        /* 画面切り替えアニメーション（高速フェードイン＆スライド） */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.22s cubic-bezier(0, 0, 0.2, 1), transform 0.22s cubic-bezier(0, 0, 0.2, 1);
        }
        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* タイトル画面 */
        .title-screen {
            text-align: center;
            padding: 20px 0;
        }
        .title-screen h1 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 12px;
        }
        .title-screen p {
            color: #718096;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .btn-start {
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
            transition: transform 0.12s ease, background 0.2s ease;
        }
        .btn-start:active {
            transform: scale(0.96);
        }

        /* カテゴリー選択画面 */
        .category-title {
            font-size: 1.2rem;
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        .cat-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-cat {
            background-color: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 0.95rem;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #2d3748;
            transition: transform 0.1s ease, border-color 0.2s ease, background 0.2s ease;
        }
        .btn-cat:hover {
            background-color: #ebf8ff;
            border-color: #63b3ed;
        }
        .btn-cat:active {
            transform: scale(0.98);
        }
        .cat-count {
            font-size: 0.8rem;
            color: #718096;
            background-color: #edf2f7;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* クイズ画面 */
        .header {
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .cat-tag {
            font-size: 0.8rem;
            background-color: #e2e8f0;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .progress-bar-container {
            background-color: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar {
            background-color: #3182ce;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease-out;
        }
        .status {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #718096;
            margin-top: 8px;
        }
        .question-box {
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.15rem;
            color: #1a202c;
            line-height: 1.5;
            font-weight: bold;
        }
        .sub-instruction {
            font-size: 0.85rem;
            color: #e53e3e;
            margin-top: 4px;
            font-weight: normal;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-option {
            background-color: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.95rem;
            text-align: left;
            cursor: pointer;
            color: #2d3748;
            transition: transform 0.12s ease, border-color 0.2s ease, background 0.2s ease;
        }
        .btn-option:hover:not(:disabled) {
            background-color: #ebf8ff;
            border-color: #63b3ed;
        }
        .btn-option:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-option.selected {
            border-color: #3182ce;
            background-color: #ebf8ff;
        }

        /* アニメーション：正解時（ぽんと弾む） */
        .btn-option.correct {
            background-color: #c6f6d5 !important;
            border-color: #38a169 !important;
            color: #22543d !important;
            font-weight: bold;
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* アニメーション：不正解時（横揺れ） */
        .btn-option.wrong {
            background-color: #fed7d7 !important;
            border-color: #e53e3e !important;
            color: #742a2a !important;
            animation: shake 0.25s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.98); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* 解説ボックス（下から滑らかに出現） */
        .explanation-box {
            margin-top: 16px;
            padding: 14px;
            border-radius: 10px;
            background-color: #f7fafc;
            border-left: 4px solid #3182ce;
            display: none;
            animation: slideUp 0.2s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-title {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .explanation-text {
            font-size: 0.9rem;
            color: #4a5568;
            line-height: 1.4;
        }
        .controls {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
        }
        .btn-next {
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0 3px 8px rgba(49, 130, 206, 0.3);
            transition: transform 0.12s ease;
        }
        .btn-next:active {
            transform: scale(0.96);
        }

        /* 結果画面 */
        .result-box {
            text-align: center;
            padding: 20px 0;
        }
        .result-title {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 12px;
            font-weight: bold;
        }
        .clear-message {
            background-color: #feebc8;
            color: #742a2a;
            border: 2px solid #fbd38d;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1.5;
            animation: popIn 0.3s ease-out forwards;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background-color: #f7fafc;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-num {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2b6cb0;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #718096;
            margin-top: 4px;
        }
        .action-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-restart {
            background-color: #38a169;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(56, 161, 105, 0.3);
            transition: transform 0.12s ease;
        }
        .btn-restart:active {
            transform: scale(0.96);
        }
        .btn-secondary {
            background-color: #718096;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.12s ease;
        }
        .btn-secondary:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- やめるボタン -->
        <button class="btn-quit" id="btn-quit" onclick="resetToTitle()" style="display: none;">やめる</button>

        <!-- 1. タイトル画面 -->
        <div id="screen-title" class="screen active title-screen">
            <h1>中学国語<br>類義語・対義語マスター</h1>
            <p>教科書掲載の言葉を網羅！<br>カテゴリーごとに10問ずつ挑戦しよう。</p>
            <button class="btn-start" onclick="showCategoryScreen()">挑戦する</button>
        </div>

        <!-- 2. カテゴリー選択画面 -->
        <div id="screen-category" class="screen">
            <div class="category-title">挑戦するカテゴリーを選択</div>
            <div class="cat-list">
                <button class="btn-cat" onclick="startQuiz('all')">
                    <span>🌟 全カテゴリー（ランダム）</span>
                    <span class="cat-count">10問ずつ出題</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('meaning')">
                    <span>💡 【類義語】意味から言葉を選ぶ［2つ選択］</span>
                    <span class="cat-count">15問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('syn_same')">
                    <span>【類義語】共通の字を含むもの</span>
                    <span class="cat-count">20問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('syn_all')">
                    <span>【類義語】全体として類義のもの</span>
                    <span class="cat-count">10問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('ant_same')">
                    <span>【対義語】共通の字を含むもの</span>
                    <span class="cat-count">10問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('ant_neg')">
                    <span>【対義語】否定の字を含むもの</span>
                    <span class="cat-count">10問</span>
                </button>
                <button class="btn-cat" onclick="startQuiz('ant_all')">
                    <span>【対義語】言葉全体が対義のもの</span>
                    <span class="cat-count">10問</span>
                </button>
            </div>
        </div>

        <!-- 3. クイズ画面 -->
        <div id="screen-quiz" class="screen">
            <div class="header">
                <span class="cat-tag" id="q-cat-name">カテゴリー</span>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="status">
                    <span id="q-progress">第 1 問 / 10 問</span>
                    <span>正解: <strong id="stat-correct">0</strong> | 誤答: <strong id="stat-wrong">0</strong> (正解率: <span id="stat-rate">0%</span>)</span>
                </div>
            </div>

            <div class="question-box">
                <div class="question-text" id="q-text">問題文がここに入ります</div>
                <div class="sub-instruction" id="sub-instruction" style="display: none;">※当てはまる言葉を2つ選んでください。</div>
            </div>

            <div class="options" id="options-container"></div>

            <div class="explanation-box" id="explanation-box">
                <div class="explanation-title" id="eval-result">解説</div>
                <div class="explanation-text" id="explanation-text">解説文が入ります</div>
            </div>

            <div class="controls">
                <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ</button>
            </div>
        </div>

        <!-- 4. 結果・区切り画面 -->
        <div id="screen-result" class="screen result-box">
            <div class="result-title" id="res-title">セットクリア！</div>
            <div class="clear-message" id="clear-message" style="display: none;">
                🎉 おめでとうございます！<br>全問クリア達成です！素晴らしい集中力です！
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-num" id="res-correct">0</div>
                    <div class="stat-label">正答数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="res-wrong" style="color: #e53e3e;">0</div>
                    <div class="stat-label">誤回答数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="res-rate" style="color: #38a169;">0%</div>
                    <div class="stat-label">正解率</div>
                </div>
            </div>
            <div class="action-btns">
                <button class="btn-restart" id="btn-continue" onclick="continueNextSet()">次の10問へ挑戦</button>
                <button class="btn-secondary" onclick="showCategoryScreen()">カテゴリー一覧へ</button>
            </div>
        </div>
    </div>

    <script>
        const rawDatabase = [
            {cat:"meaning", catName:"類義語:意味選択", meaning:"深く考えず簡単に行う様子", pair:["安易(あんい)", "安直(あんちょく)"], exp:"「安易」と「安直」はどちらも簡単に行う様子を表す類義語です。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"詳しいこと・細かな内容", pair:["委細(いさい)", "詳細(しょうさい)"], exp:"「委細」と「詳細」は詳しい事柄を表す類義語です。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"元気がよく生き生きとしている様子", pair:["快活(かいかつ)", "活発(かっぱつ)"], exp:"「快活」と「活発」は生き生きした様子を表す類義語です。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"物事の最も大切な中心部分", pair:["核心(かくしん)", "中心(ちゅうしん)"], exp:"「核心」と「中心」は大切な中心を表す類義語です。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"特に重要であること", pair:["肝心(かんじん)", "肝要(かんよう)"], exp:"「肝心」と「肝要」はとても重要であることを表します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"強く望むこと", pair:["願望(がんぼう)", "希望(きぼう)"], exp:"「願望」と「希望」は強く望むことを意味します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"実際に自分で行って得た知識や技術", pair:["経験(けいけん)", "体験(たいけん)"], exp:"「経験」と「体験」は実際にやって得ることを指します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"はかりごと・企み", pair:["計略(けいりゃく)", "策略(さくりゃく)"], exp:"「計略」と「策略」は企みを表す類義語です。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"非常に優れた作品", pair:["傑作(けっさく)", "名作(めいさく)"], exp:"「傑作」と「名作」は優れた作品を表します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"無駄遣いを省くこと", pair:["倹約(けんやく)", "節約(せつやく)"], exp:"「倹約」と「節約」は無駄を省くことを表します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"世間に広く知られていること", pair:["著名(ちょめい)", "有名(ゆうめい)"], exp:"「著名」と「有名」は広く知られていることを意味します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"危険がなく平穏であること", pair:["安全(あんぜん)", "無事(ぶじ)"], exp:"「安全」と「無事」は過ちや危険がないことを表します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"思い通りにならず心残りであること", pair:["遺憾(いかん)", "残念(ざんねん)"], exp:"「遺憾」と「残念」は心残りであることを意味します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"狙ったところにぴったり当たること", pair:["命中(めいちゅう)", "的中(てきちゅう)"], exp:"「命中」と「的中」は当たることを指します。"},
            {cat:"meaning", catName:"類義語:意味選択", meaning:"病人や怪我人の世話をすること", pair:["介抱(かいほう)", "看病(かんびょう)"], exp:"「介抱」と「看病」は世話をすることを表します。"},

            {cat:"syn_same", catName:"類義語:共通字", word:"安易(あんい)", ans:"安直(あんちょく)", exp:"「安易」と「安直」はどちらも簡単に済ませる様子。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"家外(かがい)", ans:"意外(いがい)", exp:"「家外」と「意外」は思いのほかであることを指す。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"以後(いご)", ans:"以降(いこう)", exp:"「以後」と「以降」はそれより後ろの時間を指す。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"委細(いさい)", ans:"詳細(しょうさい)", exp:"「委細」と「詳細」は詳しい内容のこと。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"医師(いし)", ans:"医者(いしゃ)", exp:"「医師」と「医者」は医療を行う専門職。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"永遠(えいえん)", ans:"永久(えいきゅう)", exp:"「永遠」と「永久」は果てしなく続くこと。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"応接(おうせつ)", ans:"応対(おうたい)", exp:"「応接」と「応対」は相手の相手をすること。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"応答(おうとう)", ans:"返答(へんとう)", exp:"「応答」と「返答」は問いに答えること。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"憶測(おくそく)", ans:"推測(すいそく)", exp:"「憶測」と「推測」は状態をおしはかること。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"快活(かいかつ)", ans:"活発(かっぱつ)", exp:"「快活」と「活発」は元気で生き生きとしていること。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"改善(かいぜん)", ans:"改良(かいりょう)", exp:"「改善」と「改良」は良く改めること。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"核心(かくしん)", ans:"中心(ちゅうしん)", exp:"「核心」と「中心」は大切な真ん中部分。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"慣習(かんしゅう)", ans:"慣例(かんれい)", exp:"「慣習」と「慣例」は昔からのしきたり。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"肝心(かんじん)", ans:"肝要(かんよう)", exp:"「肝心」と「肝要」は特に重要であること。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"願望(がんぼう)", ans:"希望(きぼう)", exp:"「願望」と「希望」は望み願うこと。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"企画(きかく)", ans:"計画(けいかく)", exp:"「企画」と「計画」は試みを立てること。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"気質(きしつ)", ans:"性質(せいしつ)", exp:"「気質」と「性質」は生まれ持った体質・性格。"},
            {cat:"syn_same", catName:"類義語:共通字", word:"基準(きじゅん)", ans:"標準(ひょうじゅん)", exp:"「基準」と「標準」は判断のよりどころ。"},

            {cat:"ant_same", catName:"対義語:共通字", word:"入社(にゅうしゃ)", ans:"退社(たいしゃ)", exp:"会社に入る「入社」↔ 辞める「退社」。"},
            {cat:"ant_same", catName:"対義語:共通字", word:"入選(にゅうせん)", ans:"落選(らくせん)", exp:"選ばれる「入選」↔ 落ちる「落選」。"},
            {cat:"ant_same", catName:"対義語:共通字", word:"敏感(びんかん)", ans:"鈍感(どんかん)", exp:"感度が鋭い「敏感」↔ 鈍い「鈍感」。"},

            {cat:"ant_neg", catName:"対義語:否定字", word:"安心(あんしん)", ans:"不安(ふあん)", exp:"心が落ち着く「安心」↔ 落ち着かない「不安」。"},

            {cat:"ant_neg", catName:"対義語:否定字", word:"既知(きち)", ans:"未知(みち)", exp:"知っている「既知」↔ まだ知らない「未知」。"},
            {cat:"ant_neg", catName:"対義語:否定字", word:"好況(こうきょう)", ans:"不況(ふきょう)", exp:"景気がよい「好況」↔ 景気が悪い「不況」。"},

            {cat:"ant_neg", catName:"対義語:否定字", word:"肯定(こうてい)", ans:"否定(ひてい)", exp:"認める「肯定」↔ 打ち消す「否定」。"},
            {cat:"ant_neg", catName:"対義語:否定字", word:"幸福(こうふく)", ans:"不幸(ふこう)", exp:"幸せ「幸福」↔ 幸せでない「不幸」。"},
            {cat:"ant_neg", catName:"対義語:否定字", word:"必要(ひつよう)", ans:"不要(ふよう)", exp:"要る「必要」↔ 要らない「不要」。"},
            {cat:"ant_neg", catName:"対義語:否定字", word:"便利(べんり)", ans:"不便(ふべん)", exp:"重宝する「便利」↔ 重宝しない「不便」。"},

            {cat:"ant_all", catName:"対義語:言葉全体", word:"有害(ゆうがい)", ans:"無害(むがい)", exp:"「有害」↔「無害」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"有効(ゆうこう)", ans:"無効(むこう)", exp:"効き目がある「有効」↔ 効き目がない「無効」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"有名(ゆうめい)", ans:"無名(むめい)", exp:"名が通っている「有名」↔ 通っていない「無名」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"有利(ゆうり)", ans:"不利(ふり)", exp:"条件が良い「有利」↔ 悪い「不利」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"安全(あんぜん)", ans:"危険(きけん)", exp:"あぶなくない「安全」↔ あぶない「危険」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"一般(いっぱん)", ans:"特殊(とくしゅ)", exp:"広く共通する「一般」↔ 限られた「特殊」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"移動(いどう)", ans:"固定(こてい)", exp:"動かす「移動」↔ 固める「固定」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"開始(かいし)", ans:"終了(しゅうりょう)", exp:"はじまる「開始」↔ おわる「終了」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"拡大(かくだい)", ans:"縮小(しゅくしょう)", exp:"ひろげる「拡大」↔ ちぢめる「縮小」。"},
            {cat:"ant_all", catName:"対義語:言葉全体", word:"乾燥(かんそう)", ans:"湿潤(しつじゅん)", exp:"かわいている「乾燥」↔ うるおっている「湿潤」。"}
        ];

        let currentPool = [];
        let setQuestions = [];
        let currentIdx = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let selectedPair = [];
        let isMeaningMode = false;

        const allAnswersPool = Array.from(new Set(rawDatabase.filter(d => d.ans).map(d => d.ans)));

        function switchScreen(screenId) {
            const currentActive = document.querySelector('.screen.active');
            if (currentActive) {
                currentActive.classList.remove('active');
            }
            setTimeout(() => {
                const target = document.getElementById(screenId);
                target.classList.add('active');

                const btnQuit = document.getElementById('btn-quit');
                btnQuit.style.display = (screenId === 'screen-quiz' || screenId === 'screen-result') ? 'block' : 'none';
            }, 50);
        }

        function showCategoryScreen() {
            switchScreen('screen-category');
        }

        function resetToTitle() {
            currentPool = [];
            setQuestions = [];
            currentIdx = 0;
            correctCount = 0;
            wrongCount = 0;
            selectedPair = [];
            switchScreen('screen-title');
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startQuiz(categoryKey) {
            if (categoryKey === 'all') {
                currentPool = shuffle(rawDatabase);
            } else {
                currentPool = shuffle(rawDatabase.filter(item => item.cat === categoryKey));
            }

            correctCount = 0;
            wrongCount = 0;
            startNewSet();
        }

        function startNewSet() {
            setQuestions = currentPool.slice(0, 10);
            currentPool = currentPool.slice(10);
            currentIdx = 0;

            switchScreen('screen-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            selectedPair = [];
            const q = setQuestions[currentIdx];
            isMeaningMode = (q.cat === 'meaning');

            document.getElementById('q-cat-name').innerText = q.catName;
            document.getElementById('q-progress').innerText = `第 ${currentIdx + 1} 問 / ${setQuestions.length} 問`;
            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-wrong').innerText = wrongCount;

            const total = correctCount + wrongCount;
            const rate = total > 0 ? Math.round((correctCount / total) * 100) : 0;
            document.getElementById('stat-rate').innerText = `${rate}%`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / setQuestions.length) * 100}%`;

            const subInst = document.getElementById('sub-instruction');
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            if (isMeaningMode) {
                subInst.style.display = 'block';
                document.getElementById('q-text').innerText = `【意味】${q.meaning}`;

                let dummies = shuffle(allAnswersPool.filter(a => !q.pair.includes(a))).slice(0, 2);
                let options = shuffle([...q.pair, ...dummies]);

                options.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option';
                    btn.innerText = opt;
                    btn.onclick = () => toggleSelectMeaning(opt, btn, q);
                    container.appendChild(btn);
                });
            } else {
                subInst.style.display = 'none';
                document.getElementById('q-text').innerText = `「${q.word}」の${q.catName.includes('類義語') ? '類義語' : '対義語'}は？`;

                let dummies = shuffle(allAnswersPool.filter(a => a !== q.ans)).slice(0, 3);
                let options = shuffle([q.ans, ...dummies]);

                options.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option';
                    btn.innerText = opt;
                    btn.onclick = () => checkNormalAnswer(opt, btn, q.ans);
                    container.appendChild(btn);
                });
            }

            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';
        }

        function checkNormalAnswer(selectedOpt, selectedBtn, correctOpt) {
            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => btn.disabled = true);

            const evalResult = document.getElementById('eval-result');

            if (selectedOpt === correctOpt) {
                correctCount++;
                selectedBtn.classList.add('correct');
                evalResult.innerText = '⭕ 正解！';
                evalResult.style.color = '#276749';
            } else {
                wrongCount++;
                selectedBtn.classList.add('wrong');
                buttons.forEach(btn => {
                    if (btn.innerText === correctOpt) btn.classList.add('correct');
                });
                evalResult.innerText = '❌ 不正解...';
                evalResult.style.color = '#9b2c2c';
            }

            updateStats();
            document.getElementById('explanation-text').innerText = setQuestions[currentIdx].exp;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('btn-next').style.display = 'inline-block';
        }

        function toggleSelectMeaning(opt, btn, q) {
            if (selectedPair.includes(opt)) {
                selectedPair = selectedPair.filter(item => item !== opt);
                btn.classList.remove('selected');
            } else {
                if (selectedPair.length < 2) {
                    selectedPair.push(opt);
                    btn.classList.add('selected');
                }
            }

            if (selectedPair.length === 2) {
                const buttons = document.querySelectorAll('.btn-option');
                buttons.forEach(b => b.disabled = true);

                const isCorrect = q.pair.every(val => selectedPair.includes(val));
                const evalResult = document.getElementById('eval-result');

                if (isCorrect) {
                    correctCount++;
                    buttons.forEach(b => {
                        if (q.pair.includes(b.innerText)) b.classList.add('correct');
                    });
                    evalResult.innerText = '⭕ 正解！';
                    evalResult.style.color = '#276749';
                } else {
                    wrongCount++;
                    buttons.forEach(b => {
                        if (q.pair.includes(b.innerText)) {
                            b.classList.add('correct');
                        } else if (selectedPair.includes(b.innerText)) {
                            b.classList.add('wrong');
                        }
                    });
                    evalResult.innerText = '❌ 不正解...';
                    evalResult.style.color = '#9b2c2c';
                }

                updateStats();
                document.getElementById('explanation-text').innerText = q.exp;
                document.getElementById('explanation-box').style.display = 'block';
                document.getElementById('btn-next').style.display = 'inline-block';
            }
        }

        function updateStats() {
            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-wrong').innerText = wrongCount;
            const total = correctCount + wrongCount;
            const rate = total > 0 ? Math.round((correctCount / total) * 100) : 0;
            document.getElementById('stat-rate').innerText = `${rate}%`;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < setQuestions.length) {
                loadQuestion();
            } else {
                showSetResult();
            }
        }

        function showSetResult() {
            switchScreen('screen-result');
            const total = correctCount + wrongCount;
            const rate = total > 0 ? Math.round((correctCount / total) * 100) : 0;

            document.getElementById('res-correct').innerText = correctCount;
            document.getElementById('res-wrong').innerText = wrongCount;
            document.getElementById('res-rate').innerText = `${rate}%`;

            const btnContinue = document.getElementById('btn-continue');
            const clearMsg = document.getElementById('clear-message');

            if (currentPool.length > 0) {
                document.getElementById('res-title').innerText = "10問セットクリア！";
                btnContinue.style.display = 'inline-block';
                clearMsg.style.display = 'none';
            } else {
                document.getElementById('res-title').innerText = "全問クリア！";
                btnContinue.style.display = 'none';
                clearMsg.style.display = 'block';
            }
        }

        function continueNextSet() {
            startNewSet();
        }
    </script>
